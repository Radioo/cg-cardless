name: E2E iOS

on:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache node_modules
        id: cache-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Calculate native fingerprint
        id: fingerprint
        run: |
          HASH=$(npx @expo/fingerprint fingerprint:generate --platform ios | python3 -c "import json,sys; print(json.load(sys.stdin)['hash'])")
          echo "hash=$HASH" >> $GITHUB_OUTPUT

      - name: Check for cached simulator build
        id: cached-app
        uses: actions/cache@v5
        with:
          path: build-cache/CGCardless.app
          key: ios-sim-app-${{ steps.fingerprint.outputs.hash }}

      - name: Expo Prebuild
        if: steps.cached-app.outputs.cache-hit != 'true'
        run: npx expo prebuild --platform ios

      - name: Cache CocoaPods
        if: steps.cached-app.outputs.cache-hit != 'true'
        id: cache-pods
        uses: actions/cache@v5
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile.lock') }}

      - name: Install CocoaPods
        if: steps.cached-app.outputs.cache-hit != 'true' && steps.cache-pods.outputs.cache-hit != 'true'
        run: cd ios && pod install

      - name: Build for Simulator
        if: steps.cached-app.outputs.cache-hit != 'true'
        run: |
          xcodebuild -workspace ios/CGCardless.xcworkspace \
            -scheme CGCardless \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath DerivedData \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Cache built app
        if: steps.cached-app.outputs.cache-hit != 'true'
        run: |
          mkdir -p build-cache
          APP_PATH=$(find DerivedData/Build/Products/Release-iphonesimulator -name "*.app" -type d | head -1)
          cp -R "$APP_PATH" build-cache/CGCardless.app

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: xcodebuild-logs
          path: DerivedData/Logs/Build/

      - name: Boot Simulator
        run: |
          DEVICE=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' in runtime:
                  for d in devices:
                      if 'iPhone 16' in d['name']:
                          print(d['udid'])
                          sys.exit(0)
          sys.exit(1)
          ")
          xcrun simctl boot "$DEVICE"
          echo "DEVICE_UDID=$DEVICE" >> $GITHUB_ENV

      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Install App on Simulator
        run: xcrun simctl install "$DEVICE_UDID" build-cache/CGCardless.app

      - name: Run Maestro Tests
        run: maestro --device "$DEVICE_UDID" test e2e-ios/

      - name: Upload Maestro logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: maestro-logs
          path: ~/.maestro/tests/

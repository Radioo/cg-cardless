name: E2E iOS

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  e2e:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache node_modules
        id: cache-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install applesimutils
        run: |
          brew tap wix/brew
          brew install applesimutils

      - name: Calculate native fingerprint
        id: fingerprint
        run: |
          HASH=$(npx @expo/fingerprint fingerprint:generate --platform ios | python3 -c "import json,sys; print(json.load(sys.stdin)['hash'])")
          echo "hash=$HASH" >> $GITHUB_OUTPUT

      - name: Check for cached simulator build
        id: cached-app
        uses: actions/cache@v5
        with:
          path: ios/build/Build/Products/Release-iphonesimulator/CGCardless.app
          key: ios-detox-app-${{ steps.fingerprint.outputs.hash }}

      - name: Expo Prebuild
        if: steps.cached-app.outputs.cache-hit != 'true'
        run: npx expo prebuild --platform ios

      - name: Cache CocoaPods
        if: steps.cached-app.outputs.cache-hit != 'true'
        id: cache-pods
        uses: actions/cache@v5
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile.lock') }}

      - name: Install CocoaPods
        if: steps.cached-app.outputs.cache-hit != 'true' && steps.cache-pods.outputs.cache-hit != 'true'
        run: cd ios && pod install

      - name: Build for Detox
        if: steps.cached-app.outputs.cache-hit != 'true'
        run: npm run test:e2e:ios:build

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: xcodebuild-logs
          path: ios/build/Logs/Build/

      - name: Run Detox Tests
        run: npm run test:e2e:ios:ci

      - name: Upload Detox artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: detox-artifacts
          path: artifacts/

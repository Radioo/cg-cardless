name: Build Android

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Build profile
        required: true
        default: production
        type: choice
        options:
          - development
          - preview
          - production

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache node_modules
        id: cache-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        env:
          GRADLE_OPTS: "-Dorg.gradle.caching=true -Dorg.gradle.parallel=true -Dorg.gradle.logging.stacktrace=all"
          EAS_BUILD_RUNNER: "eas-build"
        run: eas build --platform android --local --profile ${{ inputs.profile }} --non-interactive --output ./cg-cardless.apk

      - name: Upload Gradle build reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: gradle-build-reports
          path: |
            android/build/reports/
            android/app/build/reports/
            android/app/build/outputs/logs/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          archive: false
          name: android-${{ inputs.profile }}
          path: ./cg-cardless.apk

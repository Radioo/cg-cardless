name: Build Android

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Build profile
        required: true
        default: production
        type: choice
        options:
          - development
          - preview
          - production

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache node_modules
        id: cache-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup ccache
        id: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: android-ccache-${{ inputs.profile }}-${{ hashFiles('package-lock.json') }}
          restore-keys: android-ccache-${{ inputs.profile }}-
          max-size: 2G

      - name: Configure ccache for Android NDK
        run: |
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/ccache.gradle << 'EOF'
          allprojects {
            afterEvaluate {
              extensions.findByName('android')?.defaultConfig?.externalNativeBuild?.cmake?.with {
                arguments += [
                  '-DCMAKE_C_COMPILER_LAUNCHER=ccache',
                  '-DCMAKE_CXX_COMPILER_LAUNCHER=ccache'
                ]
              }
            }
          }
          EOF

      - name: Build
        env:
          GRADLE_OPTS: "-Dorg.gradle.caching=true -Dorg.gradle.parallel=true -Dorg.gradle.logging.stacktrace=all"
          EAS_BUILD_RUNNER: "eas-build"
          CCACHE_DIR: ${{ steps.ccache.outputs.ccache-dir }}
          CCACHE_COMPILERCHECK: content
          CCACHE_SLOPPINESS: file_macro,time_macros,include_file_mtime,include_file_ctime,pch_defines
          CCACHE_DEPEND: "true"
        run: eas build --platform android --local --profile ${{ inputs.profile }} --non-interactive --output ./cg-cardless.apk

      - name: Show ccache stats
        if: always()
        run: ccache -sv

      - name: Upload Gradle build reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: gradle-build-reports
          path: |
            android/build/reports/
            android/app/build/reports/
            android/app/build/outputs/logs/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          archive: false
          name: android-${{ inputs.profile }}
          path: ./cg-cardless.apk

name: Build Android

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Build profile
        required: true
        default: production
        type: choice
        options:
          - development
          - preview
          - production

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          npm install -g eas-cli

      - name: Build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          EXT="apk"
          if [ "${{ inputs.profile }}" = "production" ]; then
            EXT="aab"
          fi
          eas build --platform android --local --profile ${{ inputs.profile }} --non-interactive --output ./app.$EXT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ inputs.profile }}
          path: ./app.*

name: Build iOS

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Debug
          - Release

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache node_modules
        id: cache-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Calculate native fingerprint
        id: fingerprint
        run: |
          HASH=$(npx @expo/fingerprint fingerprint:generate --platform ios | python3 -c "import json,sys; print(json.load(sys.stdin)['hash'])")
          echo "hash=$HASH" >> $GITHUB_OUTPUT

      - name: Check for cached archive
        id: cached-archive
        uses: actions/cache@v5
        with:
          path: build-cache/${{ inputs.configuration }}/CGCardless.xcarchive
          key: ios-archive-${{ inputs.configuration }}-${{ steps.fingerprint.outputs.hash }}

      - name: Expo Prebuild
        if: steps.cached-archive.outputs.cache-hit != 'true'
        run: npx expo prebuild --platform ios

      - name: Cache CocoaPods
        if: steps.cached-archive.outputs.cache-hit != 'true'
        id: cache-pods
        uses: actions/cache@v5
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile.lock') }}

      - name: Install CocoaPods
        if: steps.cached-archive.outputs.cache-hit != 'true' && steps.cache-pods.outputs.cache-hit != 'true'
        run: cd ios && pod install

      - name: Build Archive (Unsigned)
        if: steps.cached-archive.outputs.cache-hit != 'true'
        run: |
          xcodebuild -workspace ios/CGCardless.xcworkspace \
            -scheme CGCardless \
            -configuration ${{ inputs.configuration }} \
            -derivedDataPath DerivedData \
            -archivePath ios/buildArchive/CGCardless.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive

      - name: Cache built archive
        if: steps.cached-archive.outputs.cache-hit != 'true'
        run: |
          mkdir -p build-cache/${{ inputs.configuration }}
          cp -R ios/buildArchive/CGCardless.xcarchive build-cache/${{ inputs.configuration }}/CGCardless.xcarchive

      - name: Restore archive from cache
        if: steps.cached-archive.outputs.cache-hit == 'true'
        run: |
          mkdir -p ios/buildArchive
          cp -R build-cache/${{ inputs.configuration }}/CGCardless.xcarchive ios/buildArchive/CGCardless.xcarchive

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: xcodebuild-logs
          path: DerivedData/Logs/Build/

      - name: Prepare IPA Package
        run: |
          COMMIT_ID=$(git rev-parse --short HEAD)
          DATE=$(date +"%Y-%m-%d_%H-%M")
          CONFIG=${{ inputs.configuration }}

          mkdir -p Payload
          cp -r ios/buildArchive/CGCardless.xcarchive/Products/Applications/CGCardless.app Payload/
          zip -qr CGCardless_${CONFIG}_${DATE}_${COMMIT_ID}.ipa Payload

          echo "IPA_NAME=CGCardless_${CONFIG}_${DATE}_${COMMIT_ID}.ipa" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          archive: false
          name: ${{ env.IPA_NAME }}
          path: ${{ env.IPA_NAME }}

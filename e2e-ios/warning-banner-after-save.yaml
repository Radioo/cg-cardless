appId: com.radi0.cgcardless
---
- launchApp:
    clearState: true

# Verify warning banner shows on home screen
- assertVisible: "No card saved. Please go to Settings to add your card."

# Navigate to Settings and save a card
- tapOn: "Settings"
- tapOn: "Enter your card"
- inputText: "02FE000000000001"
- tapOn:
    point: "50%,15%"
- tapOn: "Save Card"

# Dismiss success dialog
- assertVisible: "Saved"
- tapOn: "OK"

# Go back to home
- tapOn: "Back"

# Warning banner should no longer be visible
- assertNotVisible: "No card saved. Please go to Settings to add your card."

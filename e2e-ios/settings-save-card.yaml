appId: com.radi0.cgcardless
---
- launchApp:
    clearState: true

# Navigate to Settings
- tapOn: "Settings"

# Enter a valid Card ID (FeliCa type, starts with 02FE)
- tapOn: "Enter your card"
- inputText: "02FE000000000001"

# Save the card
- tapOn: "Save Card"

# Verify success dialog
- assertVisible: "Saved"
- assertVisible: "Card saved successfully."

# Dismiss dialog
- tapOn: "OK"

# Verify card info is displayed
- assertVisible: "Card ID"
- assertVisible: "02FE000000000001"
- assertVisible: "Display ID"

appId: com.radi0.cgcardless
---
- launchApp:
    clearState: true

# Navigate to Settings
- tapOn: "Settings"

# Tap Generate Card to populate input
- tapOn: "Generate Card"

# Save the generated card
- tapOn: "Save Card"

# Verify success dialog
- assertVisible: "Saved"
- assertVisible: "Card saved successfully."

# Dismiss dialog
- tapOn: "OK"

# Verify card info is displayed after saving generated card
- assertVisible: "Card ID"
- assertVisible: "Display ID"

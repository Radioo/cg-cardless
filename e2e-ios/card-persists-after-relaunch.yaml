appId: com.radi0.cgcardless
---
- launchApp:
    clearState: true

# Save a card first
- tapOn: "Settings"
- tapOn: "Enter your card"
- inputText: "02FE000000000001"
- tapOn:
    point: "50%,15%"
- tapOn: "Save Card"
- assertVisible: "Saved"
- tapOn: "OK"
- tapOn: "Back"

# Verify no warning banner (card is saved)
- assertNotVisible: "No card saved. Please go to Settings to add your card."

# Relaunch the app WITHOUT clearing state
- launchApp

# Warning banner should still not be visible (card persisted)
- assertNotVisible: "No card saved. Please go to Settings to add your card."

# Verify card info is still in settings
- tapOn: "Settings"
- assertVisible: "Card ID"
- assertVisible: "02FE000000000001"

appId: com.radi0.cgcardless
---
- launchApp:
    clearState: true

# Navigate to Settings and save first card
- tapOn: "Settings"
- tapOn: "Enter your card"
- inputText: "02FE000000000001"
- tapOn: "Save Card"
- assertVisible: "Saved"
- tapOn: "OK"

# Verify first card is shown
- assertVisible: "02FE000000000001"

# Overwrite with a new card
- tapOn: "Enter your card"
- eraseText: 16
- inputText: "02FEAABBCCDDEEFF"
- tapOn: "Save Card"
- assertVisible: "Saved"
- tapOn: "OK"

# Verify new card replaces old one
- assertVisible: "02FEAABBCCDDEEFF"
- assertNotVisible: "02FE000000000001"
